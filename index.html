<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketReady — AI-Powered Product Listings That Sell</title>
<meta name="description" content="MarketReady uses AI to create optimized product listings for Amazon, eBay, Walmart, Etsy, Shopify, Ozon, Wildberries and Avito.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:#252530;--text:#f0f0f5;--text2:#a0a0b5;--accent:#6c5ce7;--accent2:#4fc3f7;--gradient:linear-gradient(135deg,#6c5ce7,#4fc3f7);--gradient2:linear-gradient(135deg,#4fc3f7,#6c5ce7);--radius:12px;--radius-lg:20px}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.section{padding:100px 0}
.section-label{font-size:.75rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.section-title{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;margin-bottom:16px;line-height:1.2}
.section-sub{color:var(--text2);font-size:1.05rem;max-width:600px;margin:0 auto 48px}
.text-center{text-align:center}
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:50px;font-weight:600;font-size:.95rem;border:none;cursor:pointer;transition:all .3s ease;text-decoration:none}
.btn-primary{background:var(--gradient);color:#fff;box-shadow:0 4px 24px rgba(108,92,231,.35)}
.btn-primary:hover{box-shadow:0 6px 32px rgba(108,92,231,.55);transform:translateY(-2px)}
.btn-outline{border:1.5px solid var(--border);color:var(--text);background:transparent}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
nav{position:fixed;top:0;left:0;width:100%;z-index:100;padding:16px 0;transition:all .3s ease}
nav.scrolled{background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 0}
.nav-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:800;letter-spacing:-.5px}
.logo span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{font-size:.9rem;color:var(--text2);transition:color .3s}
.nav-links a:hover{color:var(--text)}
.nav-cta{padding:10px 24px;font-size:.85rem}
.lang-switch{display:flex;gap:4px;background:var(--surface2);border-radius:50px;padding:3px;border:1px solid var(--border)}
.lang-btn{padding:6px 14px;border-radius:50px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .3s}
.lang-btn.active{background:var(--gradient);color:#fff}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{width:24px;height:2px;background:var(--text);transition:all .3s}
.mobile-menu{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(10,10,15,.98);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:32px}
.mobile-menu.active{display:flex}
.mobile-menu a{font-size:1.3rem;color:var(--text2)}
.mobile-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--text);font-size:2rem;cursor:pointer}
.hero{padding:160px 0 100px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(108,92,231,.12) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:50px;border:1px solid var(--border);font-size:.8rem;color:var(--text2);margin-bottom:28px;background:var(--surface)}
.hero-badge .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{font-size:clamp(2.4rem,6vw,4.2rem);font-weight:800;line-height:1.08;letter-spacing:-.02em;margin-bottom:24px;max-width:800px}
.hero h1 .gradient{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:1.15rem;color:var(--text2);max-width:560px;margin-bottom:36px;line-height:1.7}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap}
.hero-stats{display:flex;gap:48px;margin-top:64px;padding-top:48px;border-top:1px solid var(--border)}
.hero-stats .stat{text-align:left}
.hero-stats .stat-num{font-size:1.8rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stats .stat-label{font-size:.8rem;color:var(--text2);margin-top:4px}
.mp-section{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.mp-grid{display:flex;justify-content:center;align-items:center;gap:36px;flex-wrap:wrap}
.mp-item{display:flex;flex-direction:column;align-items:center;gap:12px;opacity:.6;transition:opacity .3s}
.mp-item:hover{opacity:1}
.mp-icon{width:52px;height:52px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:1px solid var(--border)}
.mp-name{font-size:.8rem;color:var(--text2);font-weight:500}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;position:relative}
.steps-grid::before{content:'';position:absolute;top:40px;left:calc(16.66% + 16px);right:calc(16.66% + 16px);height:2px;background:var(--gradient);opacity:.3}
.step-card{text-align:center;position:relative}
.step-num{width:80px;height:80px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin:0 auto 24px;position:relative;z-index:1}
.step-card h3{font-size:1.15rem;font-weight:600;margin-bottom:8px}
.step-card p{color:var(--text2);font-size:.92rem;max-width:280px;margin:0 auto}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.feature-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 28px;transition:all .3s ease}
.feature-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 8px 32px rgba(108,92,231,.12)}
.feature-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,rgba(108,92,231,.15),rgba(79,195,247,.15));display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:20px}
.feature-card h3{font-size:1.05rem;font-weight:600;margin-bottom:8px}
.feature-card p{color:var(--text2);font-size:.9rem;line-height:1.6}
.pricing-section{background:var(--surface)}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;align-items:start}
.price-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 32px;transition:all .3s;position:relative}
.price-card.featured{border-color:var(--accent);box-shadow:0 0 40px rgba(108,92,231,.15)}
.price-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--gradient);padding:6px 20px;border-radius:50px;font-size:.75rem;font-weight:600;white-space:nowrap}
.price-card h3{font-size:1.1rem;font-weight:600;margin-bottom:4px}
.price-card .price-desc{color:var(--text2);font-size:.85rem;margin-bottom:24px}
.price-amount{font-size:3rem;font-weight:800;line-height:1}
.price-amount span{font-size:.95rem;font-weight:400;color:var(--text2)}
.price-list{list-style:none;margin:28px 0 32px;display:flex;flex-direction:column;gap:12px}
.price-list li{display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--text2)}
.price-list li::before{content:'✓';color:#4ade80;font-weight:700;font-size:.8rem;width:20px;height:20px;border-radius:50%;background:rgba(74,222,128,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.price-btn{width:100%;text-align:center;justify-content:center}
.test-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.test-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;transition:all .3s}
.test-card:hover{border-color:var(--accent)}
.test-stars{color:#fbbf24;font-size:.9rem;margin-bottom:16px;letter-spacing:2px}
.test-text{color:var(--text2);font-size:.95rem;line-height:1.7;margin-bottom:20px;font-style:italic}
.test-author{display:flex;align-items:center;gap:12px}
.test-avatar{width:44px;height:44px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}
.test-name{font-weight:600;font-size:.9rem}
.test-role{color:var(--text2);font-size:.8rem}
.cta-section{position:relative;overflow:hidden}
.cta-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:64px 48px;text-align:center;position:relative}
.cta-box::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(circle,rgba(108,92,231,.08) 0%,transparent 70%);pointer-events:none}
.cta-box h2{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:700;margin-bottom:12px}
.cta-box p{color:var(--text2);margin-bottom:32px;max-width:500px;margin-left:auto;margin-right:auto}
.email-form{display:flex;gap:12px;max-width:480px;margin:0 auto}
.email-form input{flex:1;padding:14px 20px;border-radius:50px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.95rem;outline:none;font-family:inherit;transition:border-color .3s}
.email-form input:focus{border-color:var(--accent)}
.email-form input::placeholder{color:#555}
.form-note{color:var(--text2);font-size:.75rem;margin-top:12px}
footer{border-top:1px solid var(--border);padding:48px 0 32px}
.footer-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:40px;flex-wrap:wrap;gap:32px}
.footer-brand{max-width:300px}
.footer-brand p{color:var(--text2);font-size:.85rem;margin-top:8px;line-height:1.6}
.footer-links-grid{display:flex;gap:64px}
.footer-col h4{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:16px}
.footer-col a{display:block;color:var(--text2);font-size:.88rem;margin-bottom:10px;transition:color .3s}
.footer-col a:hover{color:var(--text)}
.footer-bottom{border-top:1px solid var(--border);padding-top:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.footer-bottom p{color:var(--text2);font-size:.8rem}
.footer-social{display:flex;gap:16px}
.footer-social a{color:var(--text2);transition:color .3s;font-size:.9rem}
.footer-social a:hover{color:var(--accent)}
@media(max-width:1024px){
.features-grid,.pricing-grid{grid-template-columns:repeat(2,1fr)}
.steps-grid::before{display:none}
}
@media(max-width:768px){
.section{padding:72px 0}
.hero{padding:120px 0 72px}
.nav-links{display:none}
.hamburger{display:flex}
.features-grid,.pricing-grid,.steps-grid{grid-template-columns:1fr}
.test-grid{grid-template-columns:1fr}
.hero-stats{flex-direction:column;gap:24px}
.mp-grid{gap:20px}
.email-form{flex-direction:column}
.email-form .btn{width:100%;justify-content:center}
.footer-top{flex-direction:column}
.footer-links-grid{flex-direction:column;gap:32px}
.footer-bottom{flex-direction:column;text-align:center}
.cta-box{padding:40px 24px}
.price-card{max-width:400px;margin:0 auto}
}
</style>*

1_l4: "\u041f\u043e\u0434\u0431\u043e\u0440 \u043a\u043b\u044e\u0447\u0435\u0432\u044b\u0445 \u0441\u043b\u043e\u0432", p1_l5: "\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430 \u043f\u043e email", p2_badge: "\u041f\u043e\u043f\u0443\u043b\u044f\u0440\u043d\u044b\u0439", p2_desc: "\u0414\u043b\u044f \u0440\u0430\u0441\u0442\u0443\u0449\u0435\u0433\u043e \u0431\u0438\u0437\u043d\u0435\u0441\u0430", p2_l1: "50 \u043a\u0430\u0440\u0442\u043e\u0447\u0435\u043a \u0432 \u043c\u0435\u0441\u044f\u0446", p2_l2: "\u0412\u0441\u0435 8 \u043c\u0430\u0440\u043a\u0435\u0442\u043f\u043b\u0435\u0439\u0441\u043e\u0432", p2_l3: "A/B-\u0442\u0435\u0441\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435", p2_l4: "\u041f\u0440\u043e\u0434\u0432\u0438\u043d\u0443\u0442\u044b\u0439 \u043f\u043e\u0434\u0431\u043e\u0440 \u043a\u043b\u044e\u0447\u0435\u0432\u0438\u043a\u043e\u0432", p2_l5: "\u041c\u0430\u0441\u0441\u043e\u0432\u044b\u0439 \u0438\u043c\u043f\u043e\u0440\u0442 \u0438 \u044d\u043a\u0441\u043f\u043e\u0440\u0442", p2_l6: "\u041f\u0440\u0438\u043e\u0440\u0438\u0442\u0435\u0442\u043d\u0430\u044f \u043f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430", p3_desc: "\u0414\u043b\u044f \u043a\u0440\u0443\u043f\u043d\u044b\u0445 \u043f\u0440\u043e\u0434\u0430\u0432\u0446\u043e\u0432", p3_l1: "\u0411\u0435\u0437\u043b\u0438\u043c\u0438\u0442 \u043a\u0430\u0440\u0442\u043e\u0447\u0435\u043a", p3_l2: "\u0412\u0441\u0435 8 \u043c\u0430\u0440\u043a\u0435\u0442\u043f\u043b\u0435\u0439\u0441\u043e\u0432", p3_l3: "\u0414\u043e\u0441\u0442\u0443\u043f \u043a API", p3_l4: "\u0421\u0432\u043e\u0439 \u0441\u0442\u0438\u043b\u044c \u0431\u0440\u0435\u043d\u0434\u0430", p3_l5: "\u041a\u043e\u043c\u0430\u043d\u0434\u043d\u0430\u044f \u0440\u0430\u0431\u043e\u0442\u0430", p3_l6: "\u041f\u0435\u0440\u0441\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 \u043c\u0435\u043d\u0435\u0434\u0436\u0435\u0440", price_btn: "\u041d\u0430\u0447\u0430\u0442\u044c", test_label: "\u041e\u0442\u0437\u044b\u0432\u044b", test_title: "\u041d\u0430\u0441 \u043b\u044e\u0431\u044f\u0442 \u043f\u0440\u043e\u0434\u0430\u0432\u0446\u044b \u043f\u043e \u0432\u0441\u0435\u043c\u0443 \u043c\u0438\u0440\u0443", test_sub: "\u041d\u0435 \u0432\u0435\u0440\u044c\u0442\u0435 \u043d\u0430 \u0441\u043b\u043e\u0432\u043e \u2014 \u0432\u043e\u0442 \u0447\u0442\u043e \u0433\u043e\u0432\u043e\u0440\u044f\u0442 \u0440\u0435\u0430\u043b\u044c\u043d\u044b\u0435 \u043f\u0440\u043e\u0434\u0430\u0432\u0446\u044b.", t1: "\u00abMarketReady \u043f\u043e\u043b\u043d\u043e\u0441\u0442\u044c\u044e \u0438\u0437\u043c\u0435\u043d\u0438\u043b \u043c\u043e\u0439 \u043f\u043e\u0434\u0445\u043e\u0434 \u043a \u043a\u0430\u0440\u0442\u043e\u0447\u043a\u0430\u043c \u043d\u0430 Amazon. CTR \u0432\u044b\u0440\u043e\u0441 \u043d\u0430 42% \u0437\u0430 \u043f\u0435\u0440\u0432\u044b\u0439 \u043c\u0435\u0441\u044f\u0446. AI-\u0431\u0443\u043b\u043b\u0435\u0442\u044b \u0440\u0435\u0430\u043b\u044c\u043d\u043e \u043b\u0443\u0447\u0448\u0435 \u0442\u043e\u0433\u043e, \u0447\u0442\u043e \u044f \u043f\u0438\u0441\u0430\u043b \u0441\u0430\u043c.\u00bb", t2: "\u00ab\u042f \u043f\u0440\u043e\u0434\u0430\u044e \u043d\u0430 \u0442\u0440\u0451\u0445 \u043f\u043b\u043e\u0449\u0430\u0434\u043a\u0430\u0445 \u0438 \u0440\u0430\u043d\u044c\u0448\u0435 \u0442\u0440\u0430\u0442\u0438\u043b \u0432\u044b\u0445\u043e\u0434\u043d\u044b\u0435 \u043d\u0430 \u043f\u0435\u0440\u0435\u043f\u0438\u0441\u044b\u0432\u0430\u043d\u0438\u0435 \u043a\u0430\u0440\u0442\u043e\u0447\u0435\u043a. \u0422\u0435\u043f\u0435\u0440\u044c \u0433\u0435\u043d\u0435\u0440\u0438\u0440\u0443\u044e \u0432\u0441\u0435 \u0432\u0435\u0440\u0441\u0438\u0438 \u0437\u0430 \u043c\u0438\u043d\u0443\u0442\u0443. \u042d\u0442\u043e\u0442 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442 \u0441\u043f\u0430\u0441 \u043c\u043d\u0435 \u043d\u0435\u0440\u0432\u044b.\u00bb", t3: "\u00ab\u041e\u0434\u0438\u043d \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u043e\u0434\u0431\u043e\u0440 \u043a\u043b\u044e\u0447\u0435\u0432\u0438\u043a\u043e\u0432 \u0441\u0442\u043e\u0438\u0442 \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0438. \u042f \u0432\u044b\u0448\u0435\u043b \u0432 \u0442\u043e\u043f-1 \u043f\u043e \

<head>

<title>MarketReady — AI-Powered Product Listings That Sell</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:#252530;--text:#f0f0f5;--text2:#a0a0b5;--accent:#6c5ce7;--accent2:#4fc3f7;--gradient:linear-gradient(135deg,#6c5ce7,#4fc3f7);--gradient2:linear-gradient(135deg,#4fc3f7,#6c5ce7);--radius:12px;--radius-lg:20px}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.section{padding:100px 0}
.section-label{font-size:.75rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.section-title{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;margin-bottom:16px;line-height:1.2}
.section-sub{color:var(--text2);font-size:1.05rem;max-width:600px;margin:0 auto 48px}
.text-center{text-align:center}
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:50px;font-weight:600;font-size:.95rem;border:none;cursor:pointer;transition:all .3s ease;text-decoration:none}
.btn-primary{background:var(--gradient);color:#fff;box-shadow:0 4px 24px rgba(108,92,231,.35)}
.btn-primary:hover{box-shadow:0 6px 32px rgba(108,92,231,.55);transform:translateY(-2px)}
.btn-outline{border:1.5px solid var(--border);color:var(--text);background:transparent}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
nav{position:fixed;top:0;left:0;width:100%;z-index:100;padding:16px 0;transition:all .3s ease}
nav.scrolled{background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 0}
.nav-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:800;letter-spacing:-.5px}
.logo span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{font-size:.9rem;color:var(--text2);transition:color .3s}
.nav-links a:hover{color:var(--text)}
.nav-cta{padding:10px 24px;font-size:.85rem}
.lang-switch{display:flex;gap:4px;background:var(--surface2);border-radius:50px;padding:3px;border:1px solid var(--border)}
.lang-btn{padding:6px 14px;border-radius:50px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .3s}
.lang-btn.active{background:var(--gradient);color:#fff}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{width:24px;height:2px;background:var(--text);transition:all .3s}
.mobile-menu{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(10,10,15,.98);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:32px}
.mobile-menu.active{display:flex}
.mobile-menu a{font-size:1.3rem;color:var(--text2)}
.mobile-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--text);font-size:2rem;cursor:pointer}
.hero{padding:160px 0 100px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(108,92,231,.12) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:50px;border:1px solid var(--border);font-size:.8rem;color:var(--text2);margin-bottom:28px;background:var(--surface)}
.hero-badge .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{font-size:clamp(2.4rem,6vw,4.2rem);font-weight:800;line-height:1.08;letter-spacing:-.02em;margin-bottom:24px;max-width:800px}
.hero h1 .gradient{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:1.15rem;color:var(--text2);max-width:560px;margin-bottom:36px;line-height:1.7}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap}
.hero-stats{display:flex;gap:48px;margin-top:64px;padding-top:48px;border-top:1px solid var(--border)}
.hero-stats .stat{text-align:left}
.hero-stats .stat-num{font-size:1.8rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stats .stat-label{font-size:.8rem;color:var(--text2);margin-top:4px}
.mp-section{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.mp-grid{display:flex;justify-content:center;align-items:center;gap:36px;flex-wrap:wrap}
.mp-item{display:flex;flex-direction:column;align-items:center;gap:12px;opacity:.6;transition:opacity .3s}
.mp-item:hover{opacity:1}
.mp-icon{width:52px;height:52px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:1px solid var(--border)}
.mp-name{font-size:.8rem;color:var(--text2);font-weight:500}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;position:relative}
.steps-grid::before{content:'';position:absolute;top:40px;left:calc(16.66% + 16px);right:calc(16.66% + 16px);height:2px;background:var(--gradient);opacity:.3}
.step-card{text-align:center;position:relative}
.step-num{width:80px;height:80px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin:0 auto 24px;position:relative;z-index:1}
.step-card h3{font-size:1.15rem;font-weight:600;margin-bottom:8px}
.step-card p{color:var(--text2);font-size:.92rem;max-width:280px;margin:0 auto}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.feature-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 28px;transition:all .3s ease}
.feature-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 8px 32px rgba(108,92,231,.12)}
.feature-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,rgba(108,92,231,.15),rgba(79,195,247,.15));display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:20px}
.feature-card h3{font-size:1.05rem;font-weight:600;margin-bottom:8px}
.feature-card p{color:var(--text2);font-size:.9rem;line-height:1.6}
.pricing-section{background:var(--surface)}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;align-items:start}

.test-name{font-weight:600;font-size:.9rem}
.test-role{color:var(--text2);font-size:.8rem}
.cta-section{position:relative;overflow:hidden}

.email-form input:focus{border-color:var(--accent)}
.email-form input::placeholder{color:#555}

footer{border-top:1px solid var(--border);padding:48px 0 32px}

.footer-links-grid{display:flex;gap:64px}
.footer-col h4{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:16px}
.footer-col a{display:block;color:var(--text2);font-size:.88rem;margin-bottom:10px;transition:color .3s}
.footer-col a:hover{color:var(--text)}
.footer-bottom{border-top:1px solid var(--border);padding-top:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.footer-bottom p{color:var(--text2);font-size:.8rem}
.footer-social{display:flex;gap:16px}
.footer-social a{color:var(--text2);transition:color .3s;font-size:.9rem}
.footer-social a:hover{color:var(--accent)}

.hero{padding:120px 0 72px}

.hero-stats{flex-direction:column;gap:24px}
.mp-grid{gap:20px}
.email-form{flex-direction:column}
.email-form .btn{width:100%;justify-content:center}
.footer-top{flex-direction:column}
.footer-links-grid{flex-direction:column;gap:32px}
.footer-bottom{flex-direction:column;text-align:center}

.price-card{max-width:400px;margin:0 auto}
